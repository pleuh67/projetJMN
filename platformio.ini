; PlatformIO Project Configuration File
;
; Procédure de flash (ordre obligatoire) :
;   1. Upload Filesystem Image  (SPIFFS → data/)
;   2. Upload                   (firmware)

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0

build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  ; Décommenter pour activer les capteurs optionnels :
  ; -DUSE_INMP441   ; son INMP441 — conflit GPIO1-3 avec Wio-SX1262 sur XIAO ESP32S3
  ; -DUSE_HX711     ; poids HX711 — pins libres requises (prévu ESP32S3 Dev Kit)

board_build.filesystem = spiffs

lib_deps =
  adafruit/Adafruit BME280 Library
  claws/BH1750
  adafruit/RTClib
  jgromes/RadioLib@^6.6.0
  ; bogde/HX711         ; décommenter si USE_HX711 activé
