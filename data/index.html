<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Station JMN</title>
  <link rel="stylesheet" href="/w3.min.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="w3-container w3-center w3-padding-16">

    <h2 class="w3-text-white">Station JMN</h2>

    <div class="led-indicator w3-circle" id="led"></div>
    <p class="w3-text-light-grey w3-small">LED : <strong id="ledstate" class="w3-text-white">...</strong></p>

    <button class="w3-button w3-amber w3-round-large w3-margin-small"
            onclick="setLed(true)">Allumer</button>
    <button class="w3-button w3-red   w3-round-large w3-margin-small"
            onclick="setLed(false)">Eteindre</button>

    <h3 class="w3-text-grey w3-small section-title">Capteurs</h3>

    <div class="w3-row-padding sensor-grid">
      <div class="sensor-i2c w3-margin-bottom">
        <div class="w3-card w3-round-large sensor-card w3-padding-small">
          <div class="w3-tiny w3-text-grey">Temperature</div>
          <div class="w3-xlarge sensor-value" id="temp">--</div>
          <div class="w3-tiny w3-text-grey">deg C</div>
        </div>
      </div>
      <div class="sensor-i2c w3-margin-bottom">
        <div class="w3-card w3-round-large sensor-card w3-padding-small">
          <div class="w3-tiny w3-text-grey">Humidite</div>
          <div class="w3-xlarge sensor-value" id="hum">--</div>
          <div class="w3-tiny w3-text-grey">%</div>
        </div>
      </div>
      <div class="sensor-i2c w3-margin-bottom">
        <div class="w3-card w3-round-large sensor-card w3-padding-small">
          <div class="w3-tiny w3-text-grey">Pression</div>
          <div class="w3-xlarge sensor-value" id="pres">--</div>
          <div class="w3-tiny w3-text-grey">hPa</div>
        </div>
      </div>
      <div class="sensor-i2c w3-margin-bottom">
        <div class="w3-card w3-round-large sensor-card w3-padding-small">
          <div class="w3-tiny w3-text-grey">Luminosite</div>
          <div class="w3-xlarge sensor-value" id="lux">--</div>
          <div class="w3-tiny w3-text-grey">lux</div>
        </div>
      </div>
      <div class="w3-half w3-margin-bottom">
        <div class="w3-card w3-round-large sensor-card w3-padding-small" id="sound-card">
          <div class="w3-tiny w3-text-grey">Niveau sonore</div>
          <div class="w3-xlarge sensor-value" id="snd">--</div>
          <div class="w3-tiny w3-text-grey">dB</div>
        </div>
      </div>
    </div>

    <div class="w3-small w3-text-light-grey" id="upd">Chargement...</div>

    <hr class="w3-border-grey w3-margin-top">
    <div class="w3-small w3-text-grey" id="rtctime">--</div>

  </div>
  <script src="/app.js"></script>
</body>
</html>
